name: Build and push Docker image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "*.py"
      - "*.sh"
      - "*.c"
      - "requirements.txt"
  workflow_dispatch:
    inputs:
      cuda_sms:
        description: "GPU SM versions to compile for (space-separated)"
        required: false
        default: "89 90 100 120"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        # The CUDA devel image + PyTorch wheels need ~12 GB. GitHub's ubuntu-latest
        # runner ships with several large preinstalled tools we don't need.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CUDA_SMS=${{ inputs.cuda_sms || '89 90 100 120' }}
          # Layer cache stored in GitHub Actions cache — speeds up rebuilds
          # when only scripts change (compiled binaries layer is reused).
          cache-from: type=gha
          cache-to: type=gha,mode=max
